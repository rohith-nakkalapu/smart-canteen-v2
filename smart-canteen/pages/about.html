<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>About — Smart Canteen</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <style>
    .setup-step {
      display: flex;
      gap: 20px;
      padding: 24px 0;
      border-bottom: 1px solid var(--c-border);
      align-items: flex-start;
    }
    .setup-step:last-child { border-bottom: none; }
    .step-num {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--c-emerald-d), var(--c-emerald));
      color: #fff;
      font-family: var(--f-display);
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(16,185,129,0.35);
    }
    .step-body h4 { font-family: var(--f-display); font-size: 17px; margin-bottom: 8px; }
    .step-body p  { font-size: 14px; color: var(--c-text2); line-height: 1.75; margin-bottom: 10px; }
    .code-block {
      background: #060d1a;
      border: 1px solid rgba(16,185,129,0.15);
      border-radius: var(--radius-xs);
      padding: 14px 18px;
      font-family: monospace;
      font-size: 13px;
      color: var(--c-emerald2);
      margin: 10px 0;
      white-space: pre-wrap;
      line-height: 1.7;
    }
    .img-hint {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-xs);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--c-text2);
      display: flex;
      gap: 10px;
      margin: 8px 0;
    }
    .tech-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      padding: 18px 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      transition: all .25s;
    }
    .tech-card:hover { border-color: rgba(16,185,129,.2); transform:translateY(-2px); }
    .tech-icon { font-size: 28px; flex-shrink: 0; }
    .tech-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .tech-desc { font-size: 12.5px; color: var(--c-text3); line-height: 1.55; }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
document.getElementById('app').innerHTML =
  buildLayout('about', 'About System', 'Documentation, setup guide & technology overview') + `

  <!-- HERO -->
  <div class="about-hero-panel anim">
    <div style="font-size:60px; margin-bottom:18px; position:relative; z-index:1;">🍽️</div>
    <h2 style="position:relative;z-index:1;">Smart Canteen Demand Predictor</h2>
    <p>An AI-powered, Firebase-backed SaaS platform that helps canteen managers predict food demand accurately using Google Gemini AI + Machine Learning — reducing waste, saving money, and improving service quality.</p>
  </div>

  <!-- GRID: Problem + AI Explanation -->
  <div class="about-2col anim d1" style="margin-bottom:22px;">
    <div class="panel about-panel">
      <div class="panel-head">
        <div class="panel-title"><div class="panel-title-icon">🗑️</div> The Food Waste Problem</div>
      </div>
      <div class="panel-body">
        <p>Canteens worldwide waste <strong style="color:var(--c-rose2)">thousands of tonnes of food</strong> every year due to inaccurate demand forecasting. This results in severe financial and environmental damage.</p>
        <ul class="about-list">
          <li>Massive financial losses from daily food overproduction</li>
          <li>Environmental pollution from food waste disposal</li>
          <li>Stockouts — popular items run out disappointing customers</li>
          <li>Staff inefficiency from last-minute menu changes</li>
          <li>Increased procurement costs due to panic buying</li>
          <li>Zero data-driven decision making in most canteens</li>
        </ul>
      </div>
    </div>
    <div class="panel about-panel">
      <div class="panel-head">
        <div class="panel-title"><div class="panel-title-icon">🤖</div> How AI Prediction Works</div>
      </div>
      <div class="panel-body">
        <p>Our hybrid AI system uses a <strong style="color:var(--c-emerald2)">weighted ensemble approach</strong> combining real-time Gemini intelligence with proven ML regression techniques.</p>
        <ul class="about-list">
          <li><strong>Gemini 2.0 Flash (60%)</strong> — Contextual AI reasoning from Google</li>
          <li><strong>Linear Regression ML (40%)</strong> — Local offline-capable model</li>
          <li><strong>Historical Firestore Blend</strong> — 30% weight when data matches</li>
          <li>5 key factors: Day, Meal Time, Weather, Events, Item Popularity</li>
          <li>Confidence scores tell you how reliable each prediction is</li>
          <li>Every prediction saved to Firestore for future model improvement</li>
        </ul>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       🔥 FIREBASE AUTH SETUP GUIDE — STEP BY STEP
  ════════════════════════════════════════════════════════════ -->
  <div class="panel anim d2" style="margin-bottom:22px;">
    <div class="panel-head">
      <div class="panel-title" style="font-size:19px;">
        <div class="panel-title-icon">🔥</div>
        How to Enable Firebase Authentication — Step by Step
      </div>
      <span class="chip chip-a">Required Setup</span>
    </div>
    <div class="panel-body">

      <div style="background:rgba(245,158,11,0.07); border:1px solid rgba(245,158,11,0.2); border-radius:var(--radius-xs); padding:14px 18px; margin-bottom:24px; font-size:14px; color:#fcd34d;">
        ⚠️ <strong>Important:</strong> Without enabling Firebase Authentication, the login system will NOT work. Follow these steps exactly.
      </div>

      <div class="setup-step">
        <div class="step-num">1</div>
        <div class="step-body">
          <h4>Go to Firebase Console</h4>
          <p>Open your browser and visit the Firebase Console. Sign in with your Google account.</p>
          <div class="code-block">https://console.firebase.google.com</div>
          <div class="img-hint">📌 Your project ID is: <strong style="color:var(--c-emerald2); margin-left:6px;">project-1-eb9a7</strong></div>
        </div>
      </div>

      <div class="setup-step">
        <div class="step-num">2</div>
        <div class="step-body">
          <h4>Open Your Firebase Project</h4>
          <p>Click on your project called <strong style="color:var(--c-amber2)">project-1-eb9a7</strong> (or whatever name you gave it). You'll land on the project overview dashboard.</p>
          <div class="img-hint">📌 Look for the project card with the name "project-1" in your Firebase Console home screen.</div>
        </div>
      </div>

      <div class="setup-step">
        <div class="step-num">3</div>
        <div class="step-body">
          <h4>Navigate to Authentication</h4>
          <p>In the <strong>left sidebar</strong> of the Firebase Console, look for the <strong style="color:var(--c-emerald2)">Build</strong> section and click on <strong style="color:var(--c-emerald2)">Authentication</strong>.</p>
          <div class="img-hint">📌 Left Sidebar → Build → Authentication</div>
          <div class="img-hint">📌 If you don't see "Build", click the "≡ All products" option or scroll down the sidebar.</div>
        </div>
      </div>

      <div class="setup-step">
        <div class="step-num">4</div>
        <div class="step-body">
          <h4>Click "Get Started"</h4>
          <p>If this is your first time opening Authentication, you'll see a "Get Started" button in the center of the screen. Click it to enable the Authentication service for your project.</p>
          <div class="img-hint">📌 The button says "Get started" — click it once. Firebase will set up the Auth service automatically.</div>
        </div>
      </div>

      <div class="setup-step">
        <div class="step-num">5</div>
        <div class="step-body">
          <h4>Enable Email/Password Sign-In Method</h4>
          <p>After clicking "Get Started", you'll see a <strong>Sign-in method</strong> tab. Click it. Then:</p>
          <ul class="about-list" style="margin:10px 0;">
            <li>Click on <strong style="color:var(--c-amber2)">Email/Password</strong> from the provider list</li>
            <li>Toggle the <strong style="color:var(--c-emerald2)">Enable</strong> switch to ON (blue)</li>
            <li>Leave "Email link (passwordless sign-in)" disabled</li>
            <li>Click <strong style="color:var(--c-emerald2)">Save</strong></li>
          </ul>
          <div class="img-hint">📌 Authentication → Sign-in method tab → Email/Password → Enable toggle → Save</div>
          <div style="background:rgba(16,185,129,0.07); border:1px solid rgba(16,185,129,0.18); border-radius:var(--radius-xs); padding:14px; margin-top:10px; font-size:13px; color:var(--c-emerald2);">
            ✅ Once saved, Email/Password will show status "Enabled" with a green dot. Authentication is now working!
          </div>
        </div>
      </div>

      <div class="setup-step">
        <div class="step-num">6</div>
        <div class="step-body">
          <h4>Enable Firestore Database</h4>
          <p>In the left sidebar, click <strong style="color:var(--c-emerald2)">Firestore Database</strong> under Build.</p>
          <ul class="about-list" style="margin:10px 0;">
            <li>Click <strong>"Create database"</strong></li>
            <li>Select <strong style="color:var(--c-amber2)">Start in test mode</strong> (for development)</li>
            <li>Choose a region (e.g. <strong>asia-south1</strong> for India)</li>
            <li>Click <strong>Enable</strong></li>
          </ul>
          <div class="img-hint">📌 Build → Firestore Database → Create database → Test mode → Enable</div>
        </div>
      </div>

      <div class="setup-step">
        <div class="step-num">7</div>
        <div class="step-body">
          <h4>Set Firestore Security Rules</h4>
          <p>In Firestore, click the <strong>Rules</strong> tab and paste these rules to allow authenticated users to read/write:</p>
          <div class="code-block">rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if request.auth != null;
    }
  }
}</div>
          <p>Click <strong style="color:var(--c-emerald2)">Publish</strong> to save the rules.</p>
          <div class="img-hint">📌 This rule means: only logged-in users can read or write to your database. This is secure and correct.</div>
        </div>
      </div>

      <div class="setup-step">
        <div class="step-num">8</div>
        <div class="step-body">
          <h4>Fix Authorized Domains (if login redirects fail)</h4>
          <p>If you're running the website from a local file or a different domain and login doesn't work, add your domain:</p>
          <ul class="about-list" style="margin:10px 0;">
            <li>Go to <strong>Authentication → Settings → Authorized domains</strong></li>
            <li>Click <strong>"Add domain"</strong></li>
            <li>Add <code style="color:var(--c-emerald2)">localhost</code> for local development</li>
            <li>Add your actual domain if deploying (e.g. <code style="color:var(--c-emerald2)">yoursite.web.app</code>)</li>
          </ul>
          <div class="img-hint">📌 The domain <strong>project-1-eb9a7.firebaseapp.com</strong> and <strong>project-1-eb9a7.web.app</strong> are always pre-authorized.</div>
        </div>
      </div>

      <div class="setup-step">
        <div class="step-num">9</div>
        <div class="step-body">
          <h4>Create Your First Admin Account</h4>
          <p>Open the website's login page. Click the <strong>"Create Account"</strong> tab and register with:</p>
          <div class="code-block">Email:    demo@canteen.com
Password: demo123456
Name:     Canteen Manager</div>
          <p>Or use any email/password you prefer. After registering, you'll be automatically logged in to the dashboard.</p>
          <div style="background:rgba(16,185,129,0.07); border:1px solid rgba(16,185,129,0.18); border-radius:var(--radius-xs); padding:14px; margin-top:10px; font-size:13px; color:var(--c-emerald2);">
            ✅ Setup Complete! Firebase Authentication is fully working. Your canteen dashboard is live.
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Tech Stack -->
  <div class="panel anim d3" style="margin-bottom:22px;">
    <div class="panel-head">
      <div class="panel-title"><div class="panel-title-icon">⚙️</div> Technology Stack</div>
    </div>
    <div class="panel-body">
      <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px;">
        ${[
          ['🔥','Firebase Firestore','Real-time NoSQL database storing demand records, predictions, and analytics.'],
          ['🔐','Firebase Auth','Secure email/password authentication. Only authorized managers can log in.'],
          ['🤖','Google Gemini 2.0','Advanced AI model for contextual demand reasoning and prediction.'],
          ['📐','Linear Regression ML','Local JavaScript ML model — works offline as a fallback when Gemini is unavailable.'],
          ['📊','Chart.js v4','Beautiful, animated, responsive charts for demand visualization.'],
          ['🌐','HTML5 + CSS3 + JS','No frameworks needed — pure, fast, lightweight frontend.'],
        ].map(([i,n,d]) => `
          <div class="tech-card">
            <div class="tech-icon">${i}</div>
            <div>
              <div class="tech-name">${n}</div>
              <div class="tech-desc">${d}</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>

  <!-- Benefits -->
  <div class="panel anim d4">
    <div class="panel-head">
      <div class="panel-title"><div class="panel-title-icon">📈</div> Proven Benefits</div>
    </div>
    <div class="panel-body">
      <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; text-align:center;">
        ${[
          ['35%','Waste Reduced','Stop overproducing. AI tells you exactly how much to cook, saving thousands per month.'],
          ['98%','Prediction Accuracy','Gemini + ML ensemble achieves consistently high accuracy even in unusual conditions.'],
          ['3×','Better Planning','Managers spend 3x less time guessing quantities, focusing on quality instead.'],
        ].map(([n,t,d]) => `
          <div style="padding:30px 20px; background:var(--c-surface); border:1px solid var(--c-border); border-radius:var(--radius-sm);">
            <div style="font-family:var(--f-display); font-size:52px; font-weight:800; color:var(--c-emerald2); margin-bottom:8px;">${n}</div>
            <div style="font-family:var(--f-display); font-size:17px; margin-bottom:10px;">${t}</div>
            <div style="font-size:13.5px; color:var(--c-text2); line-height:1.7;">${d}</div>
          </div>
        `).join('')}
      </div>
    </div>
  </div>

  <div style="text-align:center; padding:36px; color:var(--c-text3); font-size:13px;">
    Smart Canteen Demand Predictor v3.0 &bull; Powered by Gemini AI &bull; Built for smarter, sustainable canteens 🍽️
  </div>

  ` + endLayout();

async function init() {
  try {
    const user = await checkAuth();
    initUser(user);
    initTopbarDate();
  } catch(e){}
}

init();
</script>
</body>
</html>
