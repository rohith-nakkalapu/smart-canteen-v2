<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AI Prediction — Smart Canteen</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/ai-engine.js"></script>
  <style>
    .select-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
    .opt-card {
      background:var(--c-surface); border:2px solid var(--c-border); border-radius:var(--radius-sm);
      padding:14px 12px; text-align:center; cursor:pointer; transition:all .22s;
      font-size:13.5px; font-weight:500; color:var(--c-text2);
    }
    .opt-card:hover { border-color:rgba(16,185,129,0.35); color:var(--c-text); background:var(--c-card2); transform:translateY(-2px); }
    .opt-card.selected { border-color:var(--c-emerald); background:rgba(16,185,129,0.1); color:var(--c-emerald2); }
    .opt-card .oc-icon { font-size:26px; margin-bottom:8px; display:block; }
    .field-label2 { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--c-text2); margin-bottom:10px; display:block; }
    .step-indicator { display:flex; gap:0; margin-bottom:32px; }
    .step { flex:1; text-align:center; position:relative; }
    .step::after { content:''; position:absolute; top:18px; left:50%; right:-50%; height:2px; background:var(--c-border); z-index:0; }
    .step:last-child::after { display:none; }
    .step-dot { width:36px; height:36px; border-radius:50%; background:var(--c-surface); border:2px solid var(--c-border); display:flex; align-items:center; justify-content:center; font-size:14px; margin:0 auto 8px; position:relative; z-index:1; transition:all .3s; font-weight:700; color:var(--c-text3); }
    .step.done .step-dot { background:rgba(16,185,129,.2); border-color:var(--c-emerald); color:var(--c-emerald2); }
    .step.active .step-dot { background:var(--c-emerald); border-color:var(--c-emerald); color:#fff; box-shadow:0 0 14px rgba(16,185,129,.5); }
    .step-lbl { font-size:11px; color:var(--c-text3); }
    .step.active .step-lbl { color:var(--c-emerald2); font-weight:600; }
    .form-section { display:none; }
    .form-section.show { display:block; animation:fadeUp .35s ease; }
    .nav-btns { display:flex; gap:12px; margin-top:24px; }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
document.getElementById('app').innerHTML =
  buildLayout('prediction', 'AI Prediction Engine', 'Powered by Gemini AI + Linear Regression') + `

  <div class="pred-layout">

    <!-- ── FORM PANEL ── -->
    <div>
      <div class="panel anim">
        <div class="panel-head">
          <div class="panel-title">
            <div class="panel-title-icon">🤖</div>
            Prediction Parameters
          </div>
          <span class="chip chip-g">Gemini AI + ML</span>
        </div>
        <div class="panel-body" style="padding:28px 32px;">

          <!-- Step indicator -->
          <div class="step-indicator" id="stepIndicator">
            <div class="step active" id="s1"><div class="step-dot">1</div><div class="step-lbl">Food Item</div></div>
            <div class="step"        id="s2"><div class="step-dot">2</div><div class="step-lbl">Day & Time</div></div>
            <div class="step"        id="s3"><div class="step-dot">3</div><div class="step-lbl">Conditions</div></div>
            <div class="step"        id="s4"><div class="step-dot">4</div><div class="step-lbl">Predict</div></div>
          </div>

          <!-- SECTION 1: Food Item -->
          <div class="form-section show" id="sec1">
            <span class="field-label2">🍽️ Select Food Item</span>
            <div class="select-grid" id="foodGrid">
              ${[
                ['Biryani','🍚'],['Fried Rice','🍳'],['Noodles','🍜'],
                ['Dosa','🫓'],['Idli','🍡'],['Sambar Rice','🍲'],
                ['Chapati Curry','🥘'],['Pasta','🍝'],['Sandwich','🥪']
              ].map(([name,icon]) => `
                <div class="opt-card" onclick="selectOpt('food','${name}',this)">
                  <span class="oc-icon">${icon}</span>${name}
                </div>
              `).join('')}
            </div>
            <div class="nav-btns">
              <button class="btn btn-primary" onclick="goStep(2)" style="width:auto;padding:13px 28px;">Next: Day & Time →</button>
            </div>
          </div>

          <!-- SECTION 2: Day + Meal -->
          <div class="form-section" id="sec2">
            <span class="field-label2">📅 Day of the Week</span>
            <div class="select-grid" id="dayGrid" style="grid-template-columns:repeat(auto-fill,minmax(110px,1fr));">
              ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d => `
                <div class="opt-card" onclick="selectOpt('day','${d}',this)">
                  <span class="oc-icon">${['🟢','🔵','🟡','🟠','🔴','🟣','⚪'][['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].indexOf(d.slice(0,3))]}</span>${d.slice(0,3)}
                </div>
              `).join('')}
            </div>
            <span class="field-label2" style="margin-top:24px;">🕐 Meal Time</span>
            <div class="select-grid" style="grid-template-columns:repeat(3,1fr);" id="mealGrid">
              ${[['Breakfast','🌅'],['Lunch','☀️'],['Dinner','🌙']].map(([m,i]) => `
                <div class="opt-card" onclick="selectOpt('meal','${m}',this)">
                  <span class="oc-icon" style="font-size:32px;">${i}</span>${m}
                </div>
              `).join('')}
            </div>
            <div class="nav-btns">
              <button class="btn btn-ghost" onclick="goStep(1)" style="width:auto;padding:12px 20px;">← Back</button>
              <button class="btn btn-primary" onclick="goStep(3)" style="width:auto;padding:13px 28px;">Next: Conditions →</button>
            </div>
          </div>

          <!-- SECTION 3: Weather + Event -->
          <div class="form-section" id="sec3">
            <span class="field-label2">🌤️ Weather Condition</span>
            <div class="select-grid" style="grid-template-columns:repeat(5,1fr);" id="wxGrid">
              ${[['Sunny','☀️'],['Cloudy','☁️'],['Rainy','🌧️'],['Windy','💨'],['Stormy','⛈️']].map(([w,i]) => `
                <div class="opt-card" onclick="selectOpt('wx','${w}',this)">
                  <span class="oc-icon" style="font-size:32px;">${i}</span>${w}
                </div>
              `).join('')}
            </div>
            <span class="field-label2" style="margin-top:24px;">🎉 Special Event Today?</span>
            <div class="select-grid" style="grid-template-columns:1fr 1fr;" id="evtGrid">
              <div class="opt-card" onclick="selectOpt('evt','No',this)">
                <span class="oc-icon" style="font-size:32px;">❌</span>No Special Event
              </div>
              <div class="opt-card" onclick="selectOpt('evt','Yes',this)">
                <span class="oc-icon" style="font-size:32px;">🎊</span>Yes — Special Event!
              </div>
            </div>
            <div class="nav-btns">
              <button class="btn btn-ghost" onclick="goStep(2)" style="width:auto;padding:12px 20px;">← Back</button>
              <button class="btn btn-primary" onclick="goStep(4)" style="width:auto;padding:13px 28px;">Next: Review →</button>
            </div>
          </div>

          <!-- SECTION 4: Confirm & Predict -->
          <div class="form-section" id="sec4">
            <span class="field-label2">✅ Confirm Inputs</span>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
              ${['food','day','meal','wx','evt'].map((k,i) => `
                <div style="background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius-xs);padding:14px 16px;">
                  <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--c-text3);margin-bottom:5px;">${['Food Item','Day','Meal Time','Weather','Special Event'][i]}</div>
                  <div style="font-size:15px;font-weight:600;color:var(--c-text);" id="conf_${k}">—</div>
                </div>
              `).join('')}
              <div style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.15);border-radius:var(--radius-xs);padding:14px 16px;">
                <div style="font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--c-text3);margin-bottom:5px;">AI Engine</div>
                <div style="font-size:13px;font-weight:600;color:var(--c-emerald2);">Gemini + ML</div>
              </div>
            </div>

            <div id="formErr" class="alert alert-err" style="margin-bottom:14px;"></div>

            <button class="btn btn-primary" id="predictBtn" onclick="runPred()" style="font-size:17px; padding:18px; position:relative;">
              <span id="predictBtnTxt">🚀 Predict Demand with AI</span>
            </button>

            <div class="nav-btns">
              <button class="btn btn-ghost" onclick="goStep(3)" style="width:auto;padding:12px 20px; margin-top:0;">← Back</button>
              <button class="btn btn-ghost" onclick="resetAll()" style="width:auto;padding:12px 20px; margin-top:0;">🔄 Reset All</button>
            </div>
          </div>

        </div>
      </div>

      <!-- Algorithm explainer -->
      <div class="panel anim d2" style="margin-top:22px;">
        <div class="panel-head">
          <div class="panel-title"><div class="panel-title-icon">⚙️</div> How the AI Model Works</div>
          <span class="chip chip-v">Ensemble AI</span>
        </div>
        <div class="panel-body">
          <p style="font-size:14px; color:var(--c-text2); line-height:1.75; margin-bottom:20px;">
            The prediction uses a <strong style="color:var(--c-emerald2)">weighted ensemble</strong> of <strong style="color:var(--c-amber2)">Google Gemini 2.0 Flash (60%)</strong> and a <strong style="color:var(--c-blue2)">local Linear Regression ML model (40%)</strong>. When historical Firestore data matches the inputs, it contributes a <strong style="color:var(--c-violet-light)">30% historical blend</strong> to the final result.
          </p>
          <div class="algo-grid">
            <div class="algo-card">
              <div class="algo-emoji">📅</div>
              <div class="algo-name">Day of Week</div>
              <div class="algo-desc">Friday: +18% boost. Weekend: –12–22%.</div>
            </div>
            <div class="algo-card">
              <div class="algo-emoji">🕐</div>
              <div class="algo-name">Meal Time</div>
              <div class="algo-desc">Lunch is peak (+32). Breakfast –28.</div>
            </div>
            <div class="algo-card">
              <div class="algo-emoji">🌤️</div>
              <div class="algo-name">Weather</div>
              <div class="algo-desc">Sunny +14. Rainy –20. Stormy –28.</div>
            </div>
            <div class="algo-card">
              <div class="algo-emoji">🎉</div>
              <div class="algo-name">Special Event</div>
              <div class="algo-desc">Events boost demand 35–50%.</div>
            </div>
            <div class="algo-card">
              <div class="algo-emoji">🍽️</div>
              <div class="algo-name">Food Popularity</div>
              <div class="algo-desc">Biryani: +32 base. Noodles: –6.</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── RESULT PANEL ── -->
    <div class="result-panel" id="resultPanel">

      <div class="result-empty" id="emptyState">
        <div class="result-empty-icon">🤖</div>
        <h3>Ready to Predict</h3>
        <p>Complete the 4-step form<br/>and click Predict to get<br/>your AI-powered forecast</p>
        <div style="margin-top:28px; display:flex; flex-direction:column; gap:10px; font-size:13px; color:var(--c-text3); text-align:left;">
          <div style="display:flex;align-items:center;gap:10px;"><span>✅</span> Gemini 2.0 Flash AI</div>
          <div style="display:flex;align-items:center;gap:10px;"><span>✅</span> ML Regression Model</div>
          <div style="display:flex;align-items:center;gap:10px;"><span>✅</span> Historical Data Blend</div>
          <div style="display:flex;align-items:center;gap:10px;"><span>✅</span> Saved to Firestore</div>
        </div>
      </div>

      <div class="result-data" id="resultData">
        <div class="pred-label">AI Predicted Demand</div>
        <div class="pred-big" id="bigNum">0</div>
        <div class="pred-unit">plates / portions needed</div>

        <div class="conf-wrap">
          <div class="conf-row">
            <span>Prediction Confidence</span>
            <strong id="confPct">—%</strong>
          </div>
          <div class="conf-track">
            <div class="conf-fill" id="confFill" style="width:0%"></div>
          </div>
        </div>

        <div class="result-details">
          <div class="rd-item"><div class="rd-lbl">Food Item</div><div class="rd-val" id="rFood">—</div></div>
          <div class="rd-item"><div class="rd-lbl">Meal Time</div><div class="rd-val" id="rMeal">—</div></div>
          <div class="rd-item"><div class="rd-lbl">Day</div><div class="rd-val" id="rDay">—</div></div>
          <div class="rd-item"><div class="rd-lbl">Weather</div><div class="rd-val" id="rWx">—</div></div>
          <div class="rd-item"><div class="rd-lbl">Special Event</div><div class="rd-val" id="rEvt">—</div></div>
          <div class="rd-item"><div class="rd-lbl">Waste Reduction</div><div class="rd-val" id="rWaste" style="color:var(--c-emerald2)">—</div></div>
        </div>

        <div class="ai-box" id="aiReason" style="display:none;">
          <strong>🧠 AI Reasoning:</strong> <span id="reasonText"></span>
        </div>

        <div class="tip-box" id="aiTip" style="display:none;">
          <span>💡</span>
          <div><strong>Manager Tip:</strong> <span id="tipText"></span></div>
        </div>

        <div class="rd-item" style="text-align:center; margin-bottom:0; border:1px solid rgba(139,92,246,.2); background:rgba(139,92,246,.06);">
          <div class="rd-lbl" style="text-align:center; margin-bottom:4px;">AI Engine Used</div>
          <div class="rd-val" id="rSource" style="color:#c4b5fd; font-size:12px; text-align:center;">—</div>
        </div>

        <div style="display:flex; gap:12px; margin-top:18px;">
          <button class="btn btn-secondary" onclick="saveToHistory()" style="flex:1; font-size:13px; padding:12px;">💾 Save Record</button>
          <button class="btn btn-ghost"     onclick="resetAll()"     style="flex:1; font-size:13px; padding:12px;">🔄 New Prediction</button>
        </div>
      </div>

    </div>

  </div>
  ` + endLayout();

// ── State ──────────────────────────────────────────────────
const sel = { food:null, day:null, meal:null, wx:null, evt:null };
let lastResult = null;
let curUser = null;

async function init() {
  try {
    curUser = await checkAuth();
    initUser(curUser);
    initTopbarDate();
    // Pre-set today's day
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const today = days[new Date().getDay()];
    const dayCards = document.querySelectorAll('#dayGrid .opt-card');
    dayCards.forEach(c => { if (c.textContent.trim() === today.slice(0,3)) { selectOpt('day', today, c); } });
  } catch(e) {}
}

// ── Option card selection ──────────────────────────────────
function selectOpt(type, val, el) {
  const gridMap = { food:'foodGrid', day:'dayGrid', meal:'mealGrid', wx:'wxGrid', evt:'evtGrid' };
  document.querySelectorAll(`#${gridMap[type]} .opt-card`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  sel[type] = val;
  updateConfirmView();
}

function updateConfirmView() {
  const map = { food:sel.food, day:sel.day, meal:sel.meal, wx:sel.wx, evt:sel.evt };
  Object.entries(map).forEach(([k,v]) => {
    const el = document.getElementById(`conf_${k}`);
    if (el) el.textContent = v || '—';
  });
}

// ── Step navigation ────────────────────────────────────────
function goStep(n) {
  // Validation
  if (n === 2 && !sel.food) { return showStepErr('Please select a food item first.'); }
  if (n === 3 && (!sel.day || !sel.meal)) { return showStepErr('Please select day and meal time.'); }
  if (n === 4 && (!sel.wx || !sel.evt)) { return showStepErr('Please select weather and event status.'); }

  [1,2,3,4].forEach(i => {
    const sec = document.getElementById(`sec${i}`);
    const step = document.getElementById(`s${i}`);
    sec.classList.toggle('show', i === n);
    step.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
  });
  updateConfirmView();
}

function showStepErr(msg) {
  const el = document.getElementById('formErr');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Run Prediction ─────────────────────────────────────────
async function runPred() {
  if (!sel.food || !sel.day || !sel.meal || !sel.wx || !sel.evt) {
    showStepErr('Please complete all selections.');
    return;
  }

  const btn = document.getElementById('predictBtn');
  const txt = document.getElementById('predictBtnTxt');
  btn.disabled = true;
  txt.textContent = '⏳ AI is analyzing…';
  showLoading('Gemini AI is predicting demand…');

  const inputs = { foodItem:sel.food, dayOfWeek:sel.day, mealTime:sel.meal, weather:sel.wx, specialEvent:sel.evt };

  try {
    const result = await predictDemand(inputs);
    lastResult = { inputs, result };

    // Populate result panel
    animateNumber('bigNum', 0, result.demand, 1200);
    document.getElementById('confPct').textContent = result.confidence + '%';
    setTimeout(() => { document.getElementById('confFill').style.width = result.confidence + '%'; }, 200);

    document.getElementById('rFood').textContent  = inputs.foodItem;
    document.getElementById('rMeal').textContent  = inputs.mealTime;
    document.getElementById('rDay').textContent   = inputs.dayOfWeek;
    document.getElementById('rWx').textContent    = inputs.weather;
    document.getElementById('rEvt').textContent   = inputs.specialEvent;
    document.getElementById('rWaste').textContent = result.wasteReduction || '—';
    document.getElementById('rSource').textContent = result.source;

    if (result.reasoning) {
      document.getElementById('reasonText').textContent = result.reasoning;
      document.getElementById('aiReason').style.display = 'block';
    }
    if (result.tips) {
      document.getElementById('tipText').textContent = result.tips;
      document.getElementById('aiTip').style.display = 'flex';
    }

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('resultData').classList.add('visible');
    document.getElementById('resultPanel').classList.add('has-result');

    // Auto-save prediction
    if (curUser) await savePrediction(inputs, result, curUser.uid);

  } catch (e) {
    showStepErr('Prediction failed. Please try again.');
    console.error(e);
  } finally {
    hideLoading();
    btn.disabled = false;
    txt.textContent = '🚀 Predict Demand with AI';
  }
}

async function saveToHistory() {
  if (!lastResult) return;
  try {
    showLoading('Saving to history…');
    const today = new Date().toISOString().split('T')[0];
    await db.collection('demand_history').add({
      ...lastResult.inputs, date: today, demand: lastResult.result.demand,
      isPredicted: true, createdBy: curUser?.uid,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    hideLoading();
    alert('✅ Saved to Historical Data!');
  } catch (e) { hideLoading(); alert('Save failed.'); }
}

function resetAll() {
  Object.keys(sel).forEach(k => sel[k] = null);
  document.querySelectorAll('.opt-card').forEach(c => c.classList.remove('selected'));
  goStep(1);
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('resultData').classList.remove('visible');
  document.getElementById('resultPanel').classList.remove('has-result');
  document.getElementById('confFill').style.width = '0%';
  document.getElementById('aiReason').style.display = 'none';
  document.getElementById('aiTip').style.display = 'none';
  lastResult = null;
}

// ── Animated number counter ────────────────────────────────
function animateNumber(id, from, to, dur) {
  const el = document.getElementById(id);
  const start = performance.now();
  function step(now) {
    const p = Math.min((now - start) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(from + (to - from) * ease);
    if (p < 1) requestAnimationFrame(step);
    else el.textContent = to;
  }
  requestAnimationFrame(step);
}

init();
</script>
</body>
</html>
