<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Historical Data — Smart Canteen</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/firebase-config.js"></script>
</head>
<body>
<div class="app" id="app"></div>

<script>
document.getElementById('app').innerHTML =
  buildLayout('history', 'Historical Data', 'Browse, filter and add past demand records') + `

  <!-- Summary Stats -->
  <div class="stat-grid anim" style="margin-bottom:26px;">
    <div class="stat-card g anim d1">
      <div class="stat-top"><div class="stat-icon-box">📋</div><div class="stat-trend trend-neutral">Total</div></div>
      <div class="stat-val" id="hStatTotal">—</div>
      <div class="stat-lbl">Total Records</div>
    </div>
    <div class="stat-card a anim d2">
      <div class="stat-top"><div class="stat-icon-box">📊</div><div class="stat-trend trend-neutral">Avg</div></div>
      <div class="stat-val" id="hStatAvg">—</div>
      <div class="stat-lbl">Average Demand</div>
    </div>
    <div class="stat-card b anim d3">
      <div class="stat-top"><div class="stat-icon-box">🔺</div><div class="stat-trend trend-up">Peak</div></div>
      <div class="stat-val" id="hStatPeak">—</div>
      <div class="stat-lbl">Highest Single Demand</div>
    </div>
    <div class="stat-card v anim d4">
      <div class="stat-top"><div class="stat-icon-box">🏆</div><div class="stat-trend trend-neutral">Top</div></div>
      <div class="stat-val" id="hStatTop" style="font-size:22px;">—</div>
      <div class="stat-lbl">Most Recorded Item</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="panel anim d2" style="margin-bottom:22px;">
    <div class="panel-head">
      <div class="panel-title"><div class="panel-title-icon">📈</div> Demand Over Time (Last 25 Records)</div>
      <span class="chip chip-g">All Items</span>
    </div>
    <div class="panel-body">
      <canvas id="histChart" height="70"></canvas>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar anim d3">
    <select class="filter-select" id="fItem" onchange="applyFilter()">
      <option value="">All Food Items</option>
      <option>Biryani</option><option>Fried Rice</option><option>Noodles</option>
      <option>Dosa</option><option>Idli</option><option>Sambar Rice</option>
      <option>Chapati Curry</option><option>Pasta</option><option>Sandwich</option>
    </select>
    <select class="filter-select" id="fMeal" onchange="applyFilter()">
      <option value="">All Meal Times</option>
      <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
    </select>
    <select class="filter-select" id="fWx" onchange="applyFilter()">
      <option value="">All Weather</option>
      <option>Sunny</option><option>Cloudy</option><option>Rainy</option><option>Windy</option><option>Stormy</option>
    </select>
    <button class="btn btn-secondary" onclick="openModal()" style="padding:11px 20px; white-space:nowrap; font-size:13px;">
      + Add Record
    </button>
    <button class="btn btn-ghost" onclick="loadData()" style="padding:11px 18px; font-size:13px;">
      🔄 Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="panel anim d4">
    <div class="panel-head">
      <div class="panel-title"><div class="panel-title-icon">📋</div> Demand Records</div>
      <span class="chip chip-b" id="recCount">— records</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th><th>Date</th><th>Food Item</th><th>Day</th>
            <th>Meal Time</th><th>Demand</th><th>Weather</th><th>Event</th><th>Type</th>
          </tr>
        </thead>
        <tbody id="histTbl">
          <tr><td colspan="9"><div class="empty-st"><div class="ei">📋</div><p>Loading records…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ADD RECORD MODAL -->
  <div class="modal-bg" id="addModal">
    <div class="modal-box">
      <h3>📋 Add Demand Record</h3>
      <div class="field">
        <label class="field-label">Date</label>
        <div class="field-wrap">
          <span class="field-icon">📅</span>
          <input class="field-input" type="date" id="aDate"/>
        </div>
      </div>
      <div class="form-2col">
        <div class="field">
          <label class="field-label">Food Item</label>
          <div class="field-wrap">
            <span class="field-icon">🍽️</span>
            <select class="field-input" id="aFood">
              <option value="Biryani">Biryani</option>
              <option value="Fried Rice">Fried Rice</option>
              <option value="Noodles">Noodles</option>
              <option value="Dosa">Dosa</option>
              <option value="Idli">Idli</option>
              <option value="Sambar Rice">Sambar Rice</option>
              <option value="Chapati Curry">Chapati Curry</option>
              <option value="Pasta">Pasta</option>
              <option value="Sandwich">Sandwich</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Meal Time</label>
          <div class="field-wrap">
            <span class="field-icon">🕐</span>
            <select class="field-input" id="aMeal">
              <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-2col">
        <div class="field">
          <label class="field-label">Demand (plates)</label>
          <div class="field-wrap">
            <span class="field-icon">📊</span>
            <input class="field-input" type="number" id="aDemand" placeholder="e.g. 120" min="1" max="500"/>
          </div>
        </div>
        <div class="field">
          <label class="field-label">Weather</label>
          <div class="field-wrap">
            <span class="field-icon">🌤️</span>
            <select class="field-input" id="aWx">
              <option>Sunny</option><option>Cloudy</option><option>Rainy</option><option>Windy</option><option>Stormy</option>
            </select>
          </div>
        </div>
      </div>
      <div class="field">
        <label class="field-label">Special Event?</label>
        <div class="field-wrap">
          <span class="field-icon">🎉</span>
          <select class="field-input" id="aEvt">
            <option value="false">No</option>
            <option value="true">Yes — Special Event</option>
          </select>
        </div>
      </div>
      <div style="display:flex; gap:12px; margin-top:4px;">
        <button class="btn btn-primary" onclick="saveRecord()" style="flex:1;">💾 Save Record</button>
        <button class="btn btn-ghost" onclick="closeModal()" style="flex:1;">Cancel</button>
      </div>
    </div>
  </div>

  ` + endLayout();

let all = [];
let histChartInst = null;

async function init() {
  try {
    const user = await checkAuth();
    initUser(user);
    initTopbarDate();
    showLoading('Loading historical data…');
    await loadData();
    hideLoading();
  } catch (e) { hideLoading(); }
}

async function loadData() {
  const snap = await db.collection('demand_history').orderBy('date','desc').limit(120).get();
  all = [];
  snap.forEach(d => all.push({ id: d.id, ...d.data() }));
  renderStats();
  renderTable(all);
  renderChart([...all].reverse().slice(-25));
  document.getElementById('recCount').textContent = all.length + ' records';
}

function renderStats() {
  document.getElementById('hStatTotal').textContent = all.length;
  const avg = Math.round(all.reduce((s,r)=>s+(r.demand||0),0) / (all.length||1));
  document.getElementById('hStatAvg').textContent = avg;
  const peak = Math.max(...all.map(r=>r.demand||0));
  document.getElementById('hStatPeak').textContent = peak || '—';
  const iMap = {};
  all.forEach(r => { iMap[r.foodItem] = (iMap[r.foodItem]||0)+1; });
  const top = Object.entries(iMap).sort((a,b)=>b[1]-a[1])[0];
  if (top) document.getElementById('hStatTop').textContent = top[0];
}

function renderTable(rows) {
  if (!rows.length) {
    document.getElementById('histTbl').innerHTML = '<tr><td colspan="9"><div class="empty-st"><div class="ei">📋</div><p>No records found.</p></div></td></tr>';
    return;
  }
  const wxIcons = { Sunny:'☀️', Cloudy:'☁️', Rainy:'🌧️', Windy:'💨', Stormy:'⛈️' };
  const html = rows.map((r, i) => {
    const ev = (r.specialEvent===true||r.specialEvent==='true'||r.specialEvent==='Yes')
      ? '<span class="chip chip-a" style="font-size:11px;">🎉 Yes</span>'
      : '<span style="color:var(--c-text3);font-size:13px;">—</span>';
    const typeChip = r.isPredicted
      ? '<span class="chip chip-v" style="font-size:11px;">🤖 AI</span>'
      : '<span class="chip chip-b" style="font-size:11px;">📝 Manual</span>';
    const demColor = r.demand >= 120 ? 'var(--c-emerald2)' : r.demand >= 80 ? 'var(--c-amber2)' : 'var(--c-text)';
    return `
      <tr>
        <td style="color:var(--c-text3);font-size:12px;">${i+1}</td>
        <td style="font-size:13px;color:var(--c-text2);">${r.date||'—'}</td>
        <td><strong style="color:var(--c-text)">${r.foodItem||'—'}</strong></td>
        <td style="font-size:13px;color:var(--c-text2);">${r.dayOfWeek||getDayName(r.date)}</td>
        <td><span class="chip chip-g" style="font-size:12px;">${r.mealTime||'—'}</span></td>
        <td><strong style="color:${demColor};font-size:18px;">${r.demand||'—'}</strong></td>
        <td>${wxIcons[r.weather]||''} ${r.weather||'—'}</td>
        <td>${ev}</td>
        <td>${typeChip}</td>
      </tr>
    `;
  });
  document.getElementById('histTbl').innerHTML = html.join('');
}

function renderChart(rows) {
  if (histChartInst) histChartInst.destroy();
  const ctx = document.getElementById('histChart').getContext('2d');
  histChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: rows.map(r => `${r.date?.slice(5)||''} ${r.foodItem?.split(' ')[0]||''}`),
      datasets: [{
        label: 'Demand',
        data: rows.map(r => r.demand),
        backgroundColor: rows.map(r => r.demand>=100 ? 'rgba(16,185,129,0.72)' : r.demand>=70 ? 'rgba(245,158,11,0.65)' : 'rgba(59,130,246,0.55)'),
        borderRadius: 7,
        borderWidth: 0,
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display:false },
        tooltip: { backgroundColor:'#0e1c30', titleColor:'#e2e8f0', bodyColor:'#94a3b8', borderColor:'rgba(255,255,255,0.06)', borderWidth:1 }
      },
      scales: {
        x: { grid:{ color:'rgba(255,255,255,0.03)' }, ticks:{ color:'#4a6080', font:{size:10}, maxRotation:45 } },
        y: { grid:{ color:'rgba(255,255,255,0.03)' }, ticks:{ color:'#4a6080' } }
      }
    }
  });
}

function applyFilter() {
  const fi = document.getElementById('fItem').value;
  const fm = document.getElementById('fMeal').value;
  const fw = document.getElementById('fWx').value;
  const filtered = all.filter(r =>
    (!fi || r.foodItem===fi) &&
    (!fm || r.mealTime===fm) &&
    (!fw || r.weather===fw)
  );
  renderTable(filtered);
  document.getElementById('recCount').textContent = filtered.length + ' records';
}

function openModal()  {
  document.getElementById('addModal').classList.add('on');
  document.getElementById('aDate').value = new Date().toISOString().split('T')[0];
}
function closeModal() { document.getElementById('addModal').classList.remove('on'); }

async function saveRecord() {
  const date   = document.getElementById('aDate').value;
  const food   = document.getElementById('aFood').value;
  const meal   = document.getElementById('aMeal').value;
  const demand = parseInt(document.getElementById('aDemand').value);
  const wx     = document.getElementById('aWx').value;
  const evt    = document.getElementById('aEvt').value === 'true';

  if (!date || !demand || demand < 1) { alert('Please fill all fields with valid values.'); return; }

  showLoading('Saving record…');
  try {
    await db.collection('demand_history').add({
      date, foodItem:food, mealTime:meal, demand, weather:wx,
      specialEvent:evt, dayOfWeek:getDayName(date),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal();
    await loadData();
  } catch (e) { alert('Failed to save.'); }
  hideLoading();
}

init();
</script>
</body>
</html>
