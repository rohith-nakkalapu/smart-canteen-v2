<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dashboard — Smart Canteen</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../js/firebase-config.js"></script>
</head>
<body>
<div class="app" id="app"></div>

<script>
document.getElementById('app').innerHTML =
  buildLayout('dashboard', 'Dashboard', 'AI-powered canteen insights at a glance') + `

  <!-- STAT CARDS -->
  <div class="stat-grid anim">
    <div class="stat-card g anim d1">
      <div class="stat-top">
        <div class="stat-icon-box">📈</div>
        <div class="stat-trend trend-up" id="trendDemand">↑ +12%</div>
      </div>
      <div class="stat-val" id="statDemand">—</div>
      <div class="stat-lbl">Today's Predicted Demand</div>
    </div>

    <div class="stat-card a anim d2">
      <div class="stat-top">
        <div class="stat-icon-box">🏆</div>
        <div class="stat-trend trend-neutral" id="trendItem">Top</div>
      </div>
      <div class="stat-val" id="statItem" style="font-size:26px;">—</div>
      <div class="stat-lbl">Most Ordered Item</div>
    </div>

    <div class="stat-card b anim d3">
      <div class="stat-top">
        <div class="stat-icon-box">♻️</div>
        <div class="stat-trend trend-up">↑ +8%</div>
      </div>
      <div class="stat-val">32%</div>
      <div class="stat-lbl">Waste Reduction Rate</div>
    </div>

    <div class="stat-card v anim d4">
      <div class="stat-top">
        <div class="stat-icon-box">🎯</div>
        <div class="stat-trend trend-up">All time</div>
      </div>
      <div class="stat-val" id="statPreds">—</div>
      <div class="stat-lbl">AI Predictions Made</div>
    </div>
  </div>

  <!-- CHART ROW -->
  <div class="chart-grid-2 anim d2" style="margin-bottom:26px;">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <div class="panel-title-icon">📊</div>
          Demand Trend — Last 10 Records
        </div>
        <span class="chip chip-g">Live Data</span>
      </div>
      <div class="panel-body">
        <canvas id="lineChart" height="88"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <div class="panel-title-icon">🍽️</div>
          Items Distribution
        </div>
        <span class="chip chip-a">All Records</span>
      </div>
      <div class="panel-body" style="padding-bottom:16px;">
        <canvas id="donutChart" height="185"></canvas>
      </div>
    </div>
  </div>

  <!-- SECOND CHART ROW -->
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:22px; margin-bottom:26px;" class="anim d3">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <div class="panel-title-icon">🌤️</div>
          Demand by Weather Condition
        </div>
      </div>
      <div class="panel-body">
        <canvas id="weatherChart" height="120"></canvas>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">
          <div class="panel-title-icon">🕐</div>
          Demand by Meal Time
        </div>
      </div>
      <div class="panel-body">
        <canvas id="mealChart" height="120"></canvas>
      </div>
    </div>
  </div>

  <!-- RECENT PREDICTIONS TABLE -->
  <div class="panel anim d4" style="margin-bottom:30px;">
    <div class="panel-head">
      <div class="panel-title">
        <div class="panel-title-icon">🤖</div>
        Recent AI Predictions
      </div>
      <a href="prediction.html" class="btn btn-secondary" style="padding:9px 18px; font-size:13px;">
        + New Prediction
      </a>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Food Item</th>
            <th>Day</th>
            <th>Meal</th>
            <th>Weather</th>
            <th>Event</th>
            <th>Predicted</th>
            <th>Confidence</th>
            <th>Engine</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="predsTbl">
          <tr><td colspan="9">
            <div class="empty-st"><div class="ei">🤖</div>
            <p>No predictions yet.<br/><a href="prediction.html" style="color:var(--c-emerald2)">Make your first AI prediction →</a></p></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- QUICK STATS ROW -->
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:22px;" class="anim d5">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><div class="panel-title-icon">📅</div> Best Day for Demand</div>
      </div>
      <div class="panel-body" style="text-align:center; padding:28px;">
        <div style="font-size:52px; margin-bottom:10px;">📅</div>
        <div style="font-family:var(--f-display); font-size:28px; color:var(--c-emerald2); margin-bottom:6px;" id="bestDay">Friday</div>
        <div style="font-size:13px; color:var(--c-text2);">Consistently highest orders</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><div class="panel-title-icon">🌟</div> Peak Meal Time</div>
      </div>
      <div class="panel-body" style="text-align:center; padding:28px;">
        <div style="font-size:52px; margin-bottom:10px;">☀️</div>
        <div style="font-family:var(--f-display); font-size:28px; color:var(--c-amber2); margin-bottom:6px;">Lunch</div>
        <div style="font-size:13px; color:var(--c-text2);">Highest footfall period</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title"><div class="panel-title-icon">💡</div> AI Insight</div>
      </div>
      <div class="panel-body" style="padding:24px;">
        <div style="font-size:14px; color:var(--c-text2); line-height:1.75;" id="aiInsight">
          Loading AI insight…
        </div>
        <div style="margin-top:14px; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--c-text3);">
          <div class="status-dot"></div> Live AI Analysis
        </div>
      </div>
    </div>
  </div>

  ` + endLayout();

// ── INIT ────────────────────────────────────────────────────
async function init() {
  try {
    const user = await checkAuth();
    initUser(user);
    initTopbarDate();
    showLoading('Loading dashboard…');
    await seedSampleData(user.uid);
    await Promise.all([loadStats(), loadCharts(), loadPredTable()]);
    loadInsight();
    hideLoading();
  } catch (e) { hideLoading(); }
}

async function loadStats() {
  const snap = await db.collection('demand_history').orderBy('date','desc').limit(60).get();
  const rows = [];
  snap.forEach(d => rows.push(d.data()));

  const avg = Math.round(rows.reduce((s,r) => s+(r.demand||0), 0) / (rows.length||1));
  document.getElementById('statDemand').textContent = Math.round(avg * 1.12);

  const itemTotals = {};
  rows.forEach(r => { itemTotals[r.foodItem] = (itemTotals[r.foodItem]||0) + (r.demand||0); });
  const top = Object.entries(itemTotals).sort((a,b) => b[1]-a[1])[0];
  if (top) {
    document.getElementById('statItem').textContent = top[0];
    document.getElementById('trendItem').textContent = `${top[1]} served`;
  }

  const pSnap = await db.collection('predictions').get();
  document.getElementById('statPreds').textContent = pSnap.size;
}

async function loadCharts() {
  const snap = await db.collection('demand_history').orderBy('date','desc').limit(40).get();
  const rows = [];
  snap.forEach(d => rows.push(d.data()));
  rows.reverse();

  const COLORS = ['#10b981','#f59e0b','#3b82f6','#8b5cf6','#f43f5e','#06b6d4'];

  // Line chart — last 10
  const last10 = rows.slice(-10);
  new Chart(document.getElementById('lineChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: last10.map(r => `${r.date?.slice(5)||''} ${r.foodItem?.split(' ')[0]||''}`),
      datasets: [{
        label: 'Demand (plates)',
        data: last10.map(r => r.demand),
        borderColor: '#10b981',
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0,0,0,ctx.chart.height);
          g.addColorStop(0,'rgba(16,185,129,0.22)');
          g.addColorStop(1,'rgba(16,185,129,0)');
          return g;
        },
        borderWidth: 3,
        fill: true,
        tension: 0.45,
        pointBackgroundColor: '#10b981',
        pointBorderColor: '#060d1a',
        pointBorderWidth: 2,
        pointRadius: 5,
      }]
    },
    options: chartOpts('Demand (plates)')
  });

  // Doughnut
  const iMap = {};
  rows.forEach(r => { iMap[r.foodItem] = (iMap[r.foodItem]||0) + (r.demand||0); });
  const sorted = Object.entries(iMap).sort((a,b)=>b[1]-a[1]).slice(0,6);

  new Chart(document.getElementById('donutChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: sorted.map(i=>i[0]),
      datasets: [{ data: sorted.map(i=>i[1]), backgroundColor: COLORS, borderWidth: 3, borderColor: '#0e1c30', hoverOffset: 8 }]
    },
    options: {
      responsive: true,
      cutout: '68%',
      plugins: {
        legend: { position:'bottom', labels:{ color:'#94a3b8', padding:14, font:{size:12,family:"'DM Sans',sans-serif"} }},
        tooltip: { backgroundColor:'#0e1c30', titleColor:'#e2e8f0', bodyColor:'#94a3b8', borderColor:'rgba(255,255,255,0.06)', borderWidth:1 }
      }
    }
  });

  // Weather bar chart
  const wxMap = {};
  rows.forEach(r => {
    if (!wxMap[r.weather]) wxMap[r.weather] = { total:0, count:0 };
    wxMap[r.weather].total += (r.demand||0);
    wxMap[r.weather].count++;
  });
  const wxLabels = Object.keys(wxMap);
  const wxData   = wxLabels.map(k => Math.round(wxMap[k].total/wxMap[k].count));

  new Chart(document.getElementById('weatherChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: wxLabels,
      datasets: [{
        label: 'Avg Demand',
        data: wxData,
        backgroundColor: ['rgba(245,158,11,0.7)','rgba(148,163,184,0.5)','rgba(59,130,246,0.65)','rgba(16,185,129,0.6)','rgba(244,63,94,0.65)'],
        borderRadius: 8,
        borderWidth: 0
      }]
    },
    options: chartOpts('Avg Demand')
  });

  // Meal time chart
  const mMap = { Breakfast:{ total:0,count:0 }, Lunch:{ total:0,count:0 }, Dinner:{ total:0,count:0 } };
  rows.forEach(r => {
    if (mMap[r.mealTime]) { mMap[r.mealTime].total += (r.demand||0); mMap[r.mealTime].count++; }
  });
  new Chart(document.getElementById('mealChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: ['Breakfast','Lunch','Dinner'],
      datasets: [{
        label: 'Avg Demand',
        data: ['Breakfast','Lunch','Dinner'].map(m => mMap[m].count ? Math.round(mMap[m].total/mMap[m].count) : 0),
        backgroundColor: ['rgba(16,185,129,0.65)','rgba(245,158,11,0.75)','rgba(139,92,246,0.65)'],
        borderRadius: 10,
        borderWidth: 0
      }]
    },
    options: chartOpts('Avg Demand')
  });
}

function chartOpts(label) {
  return {
    responsive: true,
    plugins: {
      legend: { display: false },
      tooltip: { backgroundColor:'#0e1c30', titleColor:'#e2e8f0', bodyColor:'#94a3b8', borderColor:'rgba(255,255,255,0.06)', borderWidth:1 }
    },
    scales: {
      x: { grid:{ color:'rgba(255,255,255,0.03)' }, ticks:{ color:'#4a6080', font:{size:11} } },
      y: { grid:{ color:'rgba(255,255,255,0.03)' }, ticks:{ color:'#4a6080' } }
    }
  };
}

async function loadPredTable() {
  const snap = await db.collection('predictions').orderBy('createdAt','desc').limit(10).get();
  if (snap.empty) return;

  const rows = [];
  snap.forEach(doc => {
    const d = doc.data();
    const c = d.confidence || 0;
    const cc = c >= 85 ? 'chip-g' : c >= 70 ? 'chip-a' : 'chip-b';
    const ev = (d.specialEvent === true || d.specialEvent === 'Yes')
      ? '<span class="chip chip-a">🎉 Yes</span>'
      : '<span style="color:var(--c-text3);font-size:13px;">No</span>';
    rows.push(`
      <tr>
        <td><strong style="color:var(--c-text)">${d.foodItem||'—'}</strong></td>
        <td style="color:var(--c-text2)">${d.dayOfWeek||'—'}</td>
        <td><span class="chip chip-g">${d.mealTime||'—'}</span></td>
        <td>${{Sunny:'☀️',Cloudy:'☁️',Rainy:'🌧️',Windy:'💨',Stormy:'⛈️'}[d.weather]||''} ${d.weather||'—'}</td>
        <td>${ev}</td>
        <td><strong style="color:var(--c-emerald2);font-size:18px;">${d.predictedDemand||d.demand||'—'}</strong> <small style="color:var(--c-text3)">plates</small></td>
        <td><span class="chip ${cc}">${c}%</span></td>
        <td><span class="chip chip-v" style="font-size:11px;">${(d.source||'ML').split(' ')[0]}</span></td>
        <td style="color:var(--c-text3);font-size:13px;">${fmtDate(d.createdAt)}</td>
      </tr>
    `);
  });
  document.getElementById('predsTbl').innerHTML = rows.join('');
}

const insights = [
  "📊 Friday lunches consistently show 18–25% higher demand. Prepare extra Biryani on Fridays.",
  "🌧️ Rainy days reduce canteen footfall by ~20%. Consider smaller batch sizes during monsoon.",
  "🎉 Special events boost demand by 35–50%. Always stock up 2 days before college festivals.",
  "🌅 Breakfast demand is typically 35% lower than lunch. Optimize morning ingredient quantities.",
  "🏆 Biryani accounts for the highest demand across all conditions — always a safe choice to prepare.",
  "📅 Wednesday is the most consistent day for demand — ideal for training new kitchen staff.",
  "♻️ Using AI predictions, canteens reduce food waste by an average of 28–35% within one month.",
];

function loadInsight() {
  const el = document.getElementById('aiInsight');
  if (!el) return;
  let i = 0;
  el.textContent = insights[0];
  setInterval(() => {
    el.style.opacity = 0;
    setTimeout(() => {
      i = (i + 1) % insights.length;
      el.textContent = insights[i];
      el.style.transition = 'opacity 0.5s';
      el.style.opacity = 1;
    }, 400);
  }, 5000);
}

init();
</script>
</body>
</html>
